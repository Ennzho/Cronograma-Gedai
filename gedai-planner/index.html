<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GEDAI Planner</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <header>

        <img src="assets/logo.png" class="logo">

        <h1>GEDAI Planner</h1>

        <p>Planejamento de Conteúdo</p>

    </header>

    <main>

        <section class="dashboard">

            <div class="card">

                <h3>📅 Postagens do mês</h3>

                <span id="totalPosts">0</span>

            </div>

            <div class="card">

                <h3>✅ Publicados</h3>

                <span id="publicados">0</span>

            </div>

            <div class="card">

                <h3>🟡 Pendentes</h3>

                <span id="pendentes">0</span>

            </div>

        </section>

        <section class="calendar-area">

            <div class="calendar-header">

                <button id="prevMonth">
                    ◀
                </button>

                <h2 id="monthYear"></h2>

                <button id="nextMonth">
                    ▶
                </button>

            </div>

            <div class="weekdays">

                <div>Dom</div>
                <div>Seg</div>
                <div>Ter</div>
                <div>Qua</div>
                <div>Qui</div>
                <div>Sex</div>
                <div>Sáb</div>

            </div>

            <div id="calendar"></div>

        </section>

    </main>

    <!-- Modal -->

    <div id="modal" class="modal">

        <div class="modal-content">

            <span id="closeModal">&times;</span>

            <h2 id="selectedDate"></h2>

            <label>Título</label>

            <input id="titulo" type="text">

            <label>Tipo</label>

            <select id="tipo">

                <option>Feed</option>
                <option>Stories</option>
                <option>Reels</option>
                <option>Carrossel</option>

            </select>

            <label>Legenda</label>

            <textarea id="legenda"></textarea>

            <label>Link do Drive</label>

            <input id="drive" type="text">

            <label>Thumbnail</label>

            <input id="thumb" type="text">

            <label>Status</label>

            <select id="status">

                <option>Pendente</option>
                <option>Produção</option>
                <option>Postado</option>

            </select>

            <button id="saveBtn">

                Salvar

            </button>

        </div>

    </div>

    <script src="storage.js"></script>
    <script src="calendar.js"></script>
    <script src="script.js"></script>

</body>

</html>
